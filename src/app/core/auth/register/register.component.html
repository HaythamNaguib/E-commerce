<div class="min-h-screen `bg-gradient-to-br` from-green-50 to-gray-100 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-8">

      <!-- Logo & Title -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
          <i class="fas fa-user-plus text-green-600 text-2xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
        <p class="text-gray-400 text-sm mt-1">Join LaCare today</p>
      </div>

      <!-- Form -->
      <form [formGroup]="registerForm" (ngSubmit)="submitForm()">

        <app-input
          [control]="registerForm.get('name')"
          [typeInput]="'text'"
          [idInput]="'name'"
          [labelInput]="'Full Name'">
        </app-input>

        <app-input
          [control]="registerForm.get('email')"
          [typeInput]="'email'"
          [idInput]="'email'"
          [labelInput]="'Email Address'">
        </app-input>

        <app-input
          [control]="registerForm.get('password')"
          [idInput]="'password'"
          [labelInput]="'Password'">
          Password must be at least 6 characters.
        </app-input>

        <app-input
          [control]="registerForm.get('rePassword')"
          [idInput]="'rePassword'"
          [labelInput]="'Confirm Password'">
        </app-input>

        <app-input
          [control]="registerForm.get('phone')"
          [typeInput]="'text'"
          [idInput]="'phone'"
          [labelInput]="'Phone Number'">
          Must be a valid Egyptian number (01xxxxxxxxx).
        </app-input>

        <!-- Error -->
        @if (masError) {
          <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ masError }}</span>
          </div>
        }

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition-all duration-300 disabled:bg-gray-400 disabled:cursor-not-allowed flex items-center justify-center gap-2 mt-2">
          @if (isLoading) {
            <i class="fas fa-spinner animate-spin"></i> Creating account...
          } @else {
            Register
          }
        </button>

      </form>

      <!-- Login Link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a routerLink="/login" class="text-green-600 font-semibold hover:underline">Login</a>
      </p>

    </div>

  </div>
</div>
