<section class="bg-gray-50 py-12">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

    <!-- TITLE -->
    <div class="mb-8">
      <h1 class="text-2xl md:text-3xl text-gray-800 font-bold tracking-wide">All Products</h1>
      <span class="block w-16 h-1 bg-green-600 rounded mt-2"></span>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
      @for (product of productslist | paginate: { id: 'foo',
                                                      itemsPerPage: pageSize,
                                                      currentPage: p,
                                                      totalItems: total }; track product.id) {
        <app-card [product]="product"></app-card>
      }
    </div>

    <!-- Pagination -->
    <div class="flex justify-center mt-10">
      <pagination-controls class="my-pagination" id="foo" (pageChange)="getAllProductsData($event)">
      </pagination-controls>
    </div>
  </div>
</section>
