<section class="bg-gray-50 py-16">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

    <!-- TITLE -->
    <div class="flex items-end justify-between mb-10">
      <div>
        <h2 class="text-2xl md:text-3xl text-gray-800 font-bold tracking-wide">
          Popular Products
        </h2>
        <span class="block w-16 h-1 bg-green-600 rounded mt-2"></span>
      </div>
      <a routerLink="/products" class="text-sm font-medium text-green-600 hover:text-green-700 transition-colors hidden sm:inline-flex items-center gap-1">
        View All <i class="fas fa-arrow-right text-xs"></i>
      </a>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
      @for (product of productslist.slice(0,12); track product.id) {
        <app-card [product]="product"></app-card>
      }
    </div>

    <!-- Mobile View All -->
    <div class="mt-8 text-center sm:hidden">
      <a routerLink="/products" class="inline-flex items-center gap-2 bg-white text-green-600 px-6 py-2.5 rounded-lg border border-green-200 hover:bg-green-50 transition-all duration-200 text-sm font-medium">
        View All Products <i class="fas fa-arrow-right text-xs"></i>
      </a>
    </div>

  </div>
</section>
