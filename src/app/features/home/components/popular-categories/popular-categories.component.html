<section class="py-14 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Header -->
    <div class="flex items-end justify-between mb-8">
      <div>
        <h2 class="text-2xl md:text-3xl text-gray-800 font-bold tracking-wide">Shop Popular Categories</h2>
        <span class="block w-16 h-1 bg-green-600 rounded mt-2"></span>
      </div>
      <a routerLink="/categories" class="text-sm font-medium text-green-600 hover:text-green-700 transition-colors hidden sm:inline-flex items-center gap-1">
        View All <i class="fas fa-arrow-right text-xs"></i>
      </a>
    </div>

    <owl-carousel-o [options]="categoriesOptions">
      @for (category of categoriesList; track category._id) {

        <ng-template carouselSlide [id]="category._id">
          <a [routerLink]="['/categories']" class="block border border-gray-100 rounded-xl p-3 mx-2 bg-white hover:shadow-lg transition-all duration-300 cursor-pointer group">
            <div class="overflow-hidden rounded-lg h-[200px] bg-gray-50">
              <img [src]="category.image" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" [alt]="category.name" />
            </div>
            <h3 class="mt-3 text-sm font-semibold text-gray-700 text-center group-hover:text-green-600 transition-colors">{{ category.name }}</h3>
          </a>
        </ng-template>

      }
    </owl-carousel-o>
  </div>
</section>
