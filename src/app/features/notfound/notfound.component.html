<section class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="text-center max-w-md">

    <!-- Big Icon -->
    <div class="mb-8">
      <div class="inline-flex items-center justify-center w-32 h-32 bg-gray-100 rounded-full">
        <span class="text-7xl font-bold text-gray-200">404</span>
      </div>
    </div>

    <!-- Message -->
    <h1 class="text-3xl font-bold text-gray-800 mb-3">Page Not Found</h1>
    <p class="text-gray-500 text-sm mb-8 leading-relaxed">
      Oops! The page you're looking for doesn't exist or has been moved.
    </p>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a routerLink="/home"
        class="inline-flex items-center gap-2 bg-green-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-green-700 transition-all duration-200 shadow-sm hover:shadow">
        <i class="fas fa-home text-sm"></i>
        Back to Home
      </a>
      <button onclick="history.back()"
        class="inline-flex items-center gap-2 bg-white text-gray-600 px-6 py-3 rounded-lg font-medium border border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-all duration-200">
        <i class="fas fa-arrow-left text-sm"></i>
        Go Back
      </button>
    </div>

  </div>
</section>
